<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ess Bridge Dashboard</title>
<!-- A minimal test dashboard for the WebSocket lua-bridge. Open this file in a browser with the game (+ the
     WS-capable lua-bridge) running. It drives the game live: SEND Lua/Ess calls, READ their results off the
     hidden {type:"ws"} channel, and watch the live {type:"log"} console feed. Uses the reference client
     ess-bridge.js from this same folder -- no build step, no server needed. -->
<style>
  :root { color-scheme: dark; --bg:#0e1116; --panel:#171b22; --edge:#262c36; --ink:#d7dde5; --dim:#8b95a3;
          --accent:#5ac8fa; --ok:#4ec9a0; --err:#ff6b6b; --warn:#e6b455; --send:#7aa2f7; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; background:var(--bg); color:var(--ink); }
  header { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--panel); border-bottom:1px solid var(--edge); flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:.3px; }
  .dot { width:10px; height:10px; border-radius:50%; background:var(--dim); box-shadow:0 0 0 3px rgba(255,255,255,.04); transition:background .2s; }
  .dot.open { background:var(--ok); } .dot.connecting { background:var(--warn); } .dot.error,.dot.closed { background:var(--err); }
  #state { color:var(--dim); min-width:78px; }
  input,button,textarea { font:inherit; color:var(--ink); background:#0b0e13; border:1px solid var(--edge); border-radius:6px; padding:6px 9px; }
  input#url { width:210px; }
  button { cursor:pointer; background:#1e2530; } button:hover { border-color:var(--accent); }
  button.primary { background:var(--send); color:#0b0e13; border-color:var(--send); font-weight:600; }
  main { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:12px; height:calc(100vh - 53px); }
  @media (max-width:820px){ main { grid-template-columns:1fr; height:auto; } }
  .col { display:flex; flex-direction:column; min-height:0; background:var(--panel); border:1px solid var(--edge); border-radius:9px; overflow:hidden; }
  .col > h2 { margin:0; font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); padding:9px 12px; border-bottom:1px solid var(--edge); display:flex; justify-content:space-between; align-items:center; }
  .quick { display:flex; flex-wrap:wrap; gap:6px; padding:10px 12px; border-bottom:1px solid var(--edge); }
  .quick button { font-size:12px; padding:5px 8px; }
  .inputbar { display:flex; gap:8px; padding:10px 12px; border-bottom:1px solid var(--edge); }
  .inputbar textarea { flex:1; resize:vertical; min-height:38px; max-height:160px; }
  .feed { flex:1; overflow-y:auto; padding:8px 12px; margin:0; }
  .row { padding:5px 0; border-bottom:1px solid #1f242d; white-space:pre-wrap; word-break:break-word; }
  .row:last-child { border-bottom:0; }
  .row .code { color:var(--send); } .row .code::before { content:"» "; color:var(--dim); }
  .row .res { display:block; margin-top:2px; }
  .res.ok   { color:var(--ok); }   .res.ok::before   { content:"✓ "; }
  .res.err  { color:var(--err); }  .res.err::before  { content:"⚠ "; }
  .res.warn { color:var(--warn); } .res.warn::before { content:"⏱ "; }
  .res.dim  { color:var(--dim); }  .res.dim::before  { content:"· "; }
  .feed.log .row { border-bottom:0; padding:2px 0; color:var(--dim); }
  .feed.log .row.ws { color:var(--accent); }
  .clear { cursor:pointer; color:var(--dim); font-size:11px; border:1px solid var(--edge); border-radius:5px; padding:2px 7px; background:#0b0e13; }
  .hint { color:var(--dim); font-size:12px; padding:0 12px 10px; }
</style>
</head>
<body>
<header>
  <span class="dot" id="dot"></span>
  <h1>Ess Bridge</h1>
  <span id="state">–</span>
  <input id="url" value="ws://127.0.0.1:27050" spellcheck="false">
  <button id="toggle">Connect</button>
</header>

<main>
  <section class="col">
    <h2>Console <span class="clear" id="clearC">clear</span></h2>
    <div class="quick" id="quick"></div>
    <div class="inputbar">
      <textarea id="lua" placeholder="Lua / Ess to run — Ctrl+Enter to send&#10;e.g.  return Ess.VERSION" spellcheck="false"></textarea>
      <button class="primary" id="run">Run</button>
    </div>
    <div class="hint">Results arrive on the hidden <code>{type:"ws"}</code> channel — never written to the game log.</div>
    <div class="feed" id="console"></div>
  </section>

  <section class="col">
    <h2>Game log &amp; telemetry (live) <span class="clear" id="clearL">clear</span></h2>
    <div class="hint">Blue = <code>Loader.WsSend</code> pushes (<code>{type:"ws"}</code>); grey = <code>Loader.Printf</code> (<code>{type:"log"}</code>).</div>
    <div class="feed log" id="log"></div>
  </section>
</main>

<script src="ess-bridge.js"></script>
<script>
  var $ = function (id) { return document.getElementById(id); };
  var bridge = null, connected = false;

  // ---- quick tests: harmless reads + a couple of visible in-game effects ----
  var QUICK = [
    ["version",   "return Ess.VERSION"],
    ["math",      "return 2 + 2"],
    ["my char",   "return tostring(Ess.Player.character(0))"],
    ["rng",       "return Ess.RNG.new():int(1000)"],
    ["toast",     'Ess.UI.Toast("Hello from the browser!")'],
    ["banner",    'Ess.Hud.banner("BROWSER TEST")'],
    ["log line",  'Loader.Printf("[dashboard] hello from the browser log feed")'],
  ];
  QUICK.forEach(function (q) {
    var b = document.createElement("button");
    b.textContent = q[0];
    b.title = q[1];
    b.onclick = function () { send(q[1]); };
    $("quick").appendChild(b);
  });

  // ---- console feed ----
  function autoscroll(el) { el.scrollTop = el.scrollHeight; }
  function send(code) {
    code = (code == null ? $("lua").value : code).trim();
    if (!code) return;
    var row = document.createElement("div"); row.className = "row";
    var c = document.createElement("span"); c.className = "code"; c.textContent = code;
    var r = document.createElement("span"); r.className = "res dim"; r.textContent = "sending…";
    row.appendChild(c); row.appendChild(r);
    $("console").appendChild(row); autoscroll($("console"));

    if (!bridge || !connected) { r.className = "res err"; r.textContent = "not connected"; return; }
    bridge.run(code).then(function (out) {
      if (out.error)          { r.className = "res err";  r.textContent = out.error; }
      else if (out.timedOut)  { r.className = "res warn"; r.textContent = "no result within timeout (acked=" + out.acked + ")"; }
      else if (out.ok === false) { r.className = "res err"; r.textContent = "runtime error: " + out.value; }
      else                    { r.className = "res ok";   r.textContent = (out.value === "" || out.value == null) ? "(no return value)" : out.value; }
      autoscroll($("console"));
    });
  }

  // ---- live log / telemetry feed ----
  function feedLine(text, kind) {
    var row = document.createElement("div"); row.className = "row" + (kind ? " " + kind : "");
    row.textContent = text;
    $("log").appendChild(row);
    while ($("log").children.length > 500) $("log").removeChild($("log").firstChild);
    autoscroll($("log"));
  }

  // ---- connection ----
  function setStatus(s) {
    connected = (s === "open");
    $("dot").className = "dot " + s;
    $("state").textContent = s;
    $("toggle").textContent = (s === "open" || s === "connecting") ? "Disconnect" : "Connect";
  }
  function connect() {
    if (typeof EssBridge === "undefined") { setStatus("error"); feedLine("ess-bridge.js failed to load (open this file next to it)", "ws"); return; }
    bridge = new EssBridge($("url").value, { onStatus: setStatus, onLog: function (l) { feedLine(l, "log"); }, onData: function (l) { feedLine(l, "ws"); } });
    bridge.connect().catch(function () {});
  }
  function disconnect() { if (bridge) bridge.close(); bridge = null; setStatus("closed"); }

  $("toggle").onclick = function () { (connected || (bridge && bridge.state === "connecting")) ? disconnect() : connect(); };
  $("run").onclick = function () { send(); };
  $("lua").addEventListener("keydown", function (e) { if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); send(); } });
  $("clearC").onclick = function () { $("console").innerHTML = ""; };
  $("clearL").onclick = function () { $("log").innerHTML = ""; };

  setStatus("closed");
  connect();   // auto-connect on open
</script>
</body>
</html>
